version: '3'
services:
  backend:
    build: ./backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgres://username:password@db:5432/taskmanager
      - JWT_SECRET=your_production_jwt_secret
      - FRONTEND_URL=https://yourdomain.com
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=your_production_session_secret
    depends_on:
      - db
      - redis
  backend_worker:
    build: ./backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgres://username:password@db:5432/taskmanager
      - JWT_SECRET=your_production_jwt_secret
      - FRONTEND_URL=https://yourdomain.com
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=your_production_session_secret
    depends_on:
      - db
      - redis
  frontend:
    build: ./frontend
    environment:
      - REACT_APP_API_URL=https://api.yourdomain.com
    ports:
      - "80:80"
  db:
    image: postgres:13
    environment:
      - POSTGRES_USER=username
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=taskmanager
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:6
    ports:
      - "6379:6379"
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
  load_balancer:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - backend
      - backend_worker

volumes:
  pgdata:
  grafana-storage:

